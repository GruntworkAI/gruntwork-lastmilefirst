# Common Secret Formats for Gitleaks
# Plugin-shipped rules covering gaps in gitleaks defaults.
# These complement (not replace) gitleaks' built-in rules.
#
# Tier 1: Ships with lastmilefirst plugin.
# Updated via: /run-scan-secrets --update-formats

title = "Common Secret Formats (lastmilefirst)"

# --- Database Connection Strings ---

[[rules]]
id = "lmf-postgres-connection-string"
description = "PostgreSQL connection string with embedded credentials"
regex = '''postgres(?:ql)?://[^:]+:[^@]+@[^/]+'''
tags = ["database", "connection-string"]
keywords = ["postgres"]

[[rules]]
id = "lmf-mysql-connection-string"
description = "MySQL connection string with embedded credentials"
regex = '''mysql://[^:]+:[^@]+@[^/]+'''
tags = ["database", "connection-string"]
keywords = ["mysql"]

[[rules]]
id = "lmf-mongodb-connection-string"
description = "MongoDB connection string with embedded credentials"
regex = '''mongodb(?:\+srv)?://[^:]+:[^@]+@[^/]+'''
tags = ["database", "connection-string"]
keywords = ["mongodb"]

[[rules]]
id = "lmf-redis-connection-string"
description = "Redis connection string with embedded credentials"
regex = '''redis://[^:]*:[^@]+@[^/]+'''
tags = ["database", "connection-string"]
keywords = ["redis"]

# --- Environment Variable Secrets ---

[[rules]]
id = "lmf-env-secret-value"
description = "Environment variable with high-entropy secret value"
regex = '''(?i)(?:SECRET|PASSWORD|TOKEN|API_KEY|APIKEY|ACCESS_KEY|PRIVATE_KEY)\s*=\s*["']?[A-Za-z0-9/+=]{20,}["']?'''
path = '''\.env(?:\.\w+)?$'''
tags = ["env", "secret"]
keywords = ["SECRET", "PASSWORD", "TOKEN", "API_KEY", "ACCESS_KEY"]

[[rules]]
id = "lmf-dotenv-committed"
description = "Committed .env file (should be in .gitignore)"
regex = '''^\w+=.+'''
path = '''(?:^|/)\.env$'''
tags = ["env", "committed-file"]
keywords = ["="]

# --- Terraform Secrets ---

[[rules]]
id = "lmf-terraform-secret-var"
description = "Terraform tfvars file with secret-like values"
regex = '''(?i)(?:password|secret|token|api_key|access_key|private_key)\s*=\s*"[^"]{8,}"'''
path = '''\.tfvars(?:\.\w+)?$'''
tags = ["terraform", "infrastructure"]
keywords = ["password", "secret", "token"]

[[rules]]
id = "lmf-terraform-state"
description = "Committed Terraform state file (contains secrets)"
regex = '''.+'''
path = '''(?:^|/)terraform\.tfstate(?:\.backup)?$'''
tags = ["terraform", "state-file"]

# --- Hardcoded Credentials ---

[[rules]]
id = "lmf-hardcoded-password"
description = "Hardcoded password assignment in code"
regex = '''(?i)(?:password|passwd|pwd)\s*[:=]\s*["'][^"']{8,}["']'''
tags = ["credential", "hardcoded"]
keywords = ["password", "passwd", "pwd"]
[rules.allowlist]
paths = ['''(?:test|spec|mock|fixture|example|sample|demo)''']

[[rules]]
id = "lmf-bearer-token-hardcoded"
description = "Hardcoded Bearer token in code"
regex = '''(?i)(?:Authorization|Bearer)\s*[:=]\s*["']Bearer\s+[A-Za-z0-9._\-]{20,}["']'''
tags = ["credential", "auth-header"]
keywords = ["Bearer", "Authorization"]
[rules.allowlist]
paths = ['''(?:test|spec|mock|fixture|example|sample|demo)''']

# --- Webhook URLs with Tokens ---

[[rules]]
id = "lmf-slack-webhook"
description = "Slack webhook URL"
regex = '''https://hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[A-Za-z0-9]+'''
tags = ["webhook", "slack"]
keywords = ["hooks.slack.com"]

[[rules]]
id = "lmf-discord-webhook"
description = "Discord webhook URL"
regex = '''https://discord(?:app)?\.com/api/webhooks/\d+/[A-Za-z0-9_-]+'''
tags = ["webhook", "discord"]
keywords = ["discord"]

# --- Private Keys ---

[[rules]]
id = "lmf-pem-file-committed"
description = "Committed PEM private key file"
regex = '''-----BEGIN (?:RSA |EC |DSA )?PRIVATE KEY-----'''
tags = ["key", "pem"]
keywords = ["PRIVATE KEY"]

[[rules]]
id = "lmf-pkcs8-key"
description = "PKCS8 encrypted private key"
regex = '''-----BEGIN ENCRYPTED PRIVATE KEY-----'''
tags = ["key", "pkcs8"]
keywords = ["ENCRYPTED PRIVATE KEY"]

# --- JWT Secrets ---

[[rules]]
id = "lmf-jwt-secret"
description = "JWT secret key assignment"
regex = '''(?i)(?:jwt|JWT)[\s_-]*(?:secret|SECRET|key|KEY)\s*[:=]\s*["'][^"']{16,}["']'''
tags = ["jwt", "secret"]
keywords = ["jwt", "JWT"]
[rules.allowlist]
paths = ['''(?:test|spec|mock|fixture|example|sample|demo)''']
